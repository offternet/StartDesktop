<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webtop Commander | Persistent Storage + Export/Import</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* CSS Variables for Dark/Light Mode */
    :root {
      --bg-body: #87CEEB;
      --tab-bar: #000000;
      --tab-inactive: #2a2a2a;
      --tab-active: #1a1a1a;
      --panel-bg: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #555555;
      --card-shadow: rgba(0,0,0,0.15);
      --search-bg: #ffffff;
      --search-border: #cccccc;
      --toolbar-bg: #f0f0f0;
      --btn-text: white;
      --edit-hover: rgba(255,255,255,0.3);
      --success-color: #27ae60;
      --warning-color: #e67e22;
    }

    body.dark-mode {
      --bg-body: #1a2a3a;
      --tab-bar: #0a0a0a;
      --tab-inactive: #2a2a2a;
      --tab-active: #0a0a0a;
      --panel-bg: #1e1e2e;
      --text-primary: #e0e0e0;
      --text-secondary: #aaaaaa;
      --card-shadow: rgba(0,0,0,0.4);
      --search-bg: #2d2d3a;
      --search-border: #4a4a5a;
      --toolbar-bg: #252530;
      --btn-text: #ffffff;
      --edit-hover: rgba(255,255,255,0.2);
    }

    body {
      background: var(--bg-body);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
      transition: background 0.3s;
      min-height: 100vh;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
      background: transparent;
    }

    /* Header */
    .header {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(5px);
      border-radius: 20px 20px 0 0;
      height: 85px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 10px;
    }
    .header img {
      height: 70px;
      max-width: 90%;
      object-fit: contain;
    }
    .dark-toggle {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.6);
      border: none;
      color: white;
      padding: 6px 16px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      z-index: 10;
    }

    /* Toolbar */
    .toolbar {
      background: var(--toolbar-bg);
      margin: 0 10px;
      padding: 12px 20px;
      border-radius: 50px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      transition: background 0.3s;
    }
    .search-box {
      flex: 1;
      display: flex;
      background: var(--search-bg);
      border: 1px solid var(--search-border);
      border-radius: 40px;
      padding: 5px 15px;
      align-items: center;
      gap: 8px;
    }
    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 10px 0;
      outline: none;
      color: var(--text-primary);
      font-size: 14px;
    }
    button {
      background: var(--tab-inactive);
      border: none;
      padding: 8px 20px;
      border-radius: 30px;
      color: white;
      cursor: pointer;
      font-weight: 500;
      transition: 0.2s;
    }
    button:hover {
      opacity: 0.85;
      transform: scale(0.98);
    }
    .btn-success {
      background: var(--success-color);
    }
    .btn-warning {
      background: var(--warning-color);
    }
    .info-badge {
      font-size: 12px;
      color: var(--text-secondary);
      background: var(--search-bg);
      padding: 5px 12px;
      border-radius: 20px;
    }

    /* Tabs */
    .tabs {
      background: var(--tab-bar);
      border-radius: 16px 16px 0 0;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 8px 12px 0 12px;
      margin-top: 15px;
    }
    .tab {
      background: var(--tab-inactive);
      color: #eee;
      border: none;
      padding: 8px 20px;
      border-radius: 12px 12px 0 0;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
    }
    .tab.active {
      background: var(--tab-active);
      border-bottom: 3px solid #ffaa33;
      color: white;
    }

    /* Panels */
    .panels {
      background: var(--panel-bg);
      border-radius: 0 0 20px 20px;
      padding: 25px;
      min-height: 500px;
      transition: background 0.3s;
    }
    .panel {
      display: none;
    }
    .panel.active {
      display: block;
    }

    /* 3-Column Grid */
    .buttons-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    /* Button Cards */
    .action-btn {
      background: #e74c3c;
      border-radius: 16px;
      padding: 14px 12px;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 8px var(--card-shadow);
      position: relative;
      user-select: none;
    }
    .action-btn.dragging {
      opacity: 0.4;
    }
    .action-btn.drag-over {
      transform: scale(1.02);
      border: 2px solid #ffaa33;
    }
    .btn-title {
      font-weight: bold;
      font-size: 15px;
      margin-bottom: 6px;
      text-align: center;
    }
    .btn-id {
      font-size: 11px;
      opacity: 0.8;
      text-align: center;
      font-family: monospace;
      margin-bottom: 8px;
    }
    .btn-link-preview {
      font-size: 10px;
      opacity: 0.7;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: monospace;
      background: rgba(0,0,0,0.2);
      padding: 4px 8px;
      border-radius: 20px;
    }
    .edit-icon {
      position: absolute;
      top: 8px;
      right: 12px;
      font-size: 14px;
      background: rgba(0,0,0,0.4);
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .edit-icon:hover {
      background: rgba(0,0,0,0.8);
      transform: scale(1.1);
    }
    .drag-handle {
      position: absolute;
      top: 8px;
      left: 12px;
      font-size: 16px;
      cursor: grab;
      opacity: 0.6;
    }
    .action-btn:active .drag-handle {
      cursor: grabbing;
    }
    .save-indicator {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--success-color);
      color: white;
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 12px;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .save-indicator.show {
      opacity: 1;
    }

    /* Notification */
    .notification {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #1e2a2e;
      color: #aaffcc;
      padding: 12px 24px;
      border-radius: 40px;
      font-family: monospace;
      font-size: 13px;
      border-left: 4px solid #ffaa33;
      z-index: 1000;
      transition: 0.3s;
      opacity: 0;
      transform: translateX(50px);
      pointer-events: none;
      max-width: 450px;
      word-break: break-all;
    }
    .notification.show {
      opacity: 1;
      transform: translateX(0);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: var(--panel-bg);
      color: var(--text-primary);
      padding: 25px;
      border-radius: 24px;
      width: 90%;
      max-width: 600px;
    }
    .modal-content textarea {
      width: 100%;
      height: 200px;
      margin: 15px 0;
      padding: 12px;
      font-family: monospace;
      background: var(--search-bg);
      color: var(--text-primary);
      border: 1px solid var(--search-border);
      border-radius: 12px;
    }
    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    @media (max-width: 900px) {
      .buttons-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (max-width: 550px) {
      .buttons-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <a href="http://webtop.com" target="_blank">
      <img src="webotop-logo.png" alt="Logo" onerror="this.src='https://placehold.co/600x80/2c3e50/white?text=WEBTOP+COMMANDER'">
    </a>
    <button class="dark-toggle" id="darkModeBtn">🌙 Dark</button>
  </div>

  <div class="toolbar">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="Search by name, ID, or command...">
    </div>
    <button id="clearSearchBtn">Clear</button>
    <button id="exportBtn" class="btn-success">💾 Export JSON</button>
    <button id="importBtn" class="btn-warning">📂 Import JSON</button>
    <button id="bulkImportBtn">📦 Bulk Edit</button>
    <div class="info-badge">✏️ Auto-saves | 🖱️ Drag to reorder</div>
  </div>

  <div class="tabs" id="tabsContainer"></div>
  <div class="panels" id="panelsContainer"></div>
</div>

<div class="save-indicator" id="saveIndicator">💾 Auto-saved</div>
<div class="notification" id="notification">✅ Action executed</div>

<!-- Import JSON Modal -->
<div class="modal" id="importModal">
  <div class="modal-content">
    <h3>📂 Import JSON File</h3>
    <p>Upload a JSON file with your command mappings:</p>
    <input type="file" id="jsonFileInput" accept=".json" style="margin: 15px 0; padding: 10px;">
    <div class="modal-buttons">
      <button id="cancelImportModal">Cancel</button>
      <button id="confirmImportModal" style="background:#2c7a6e;">Import File</button>
    </div>
  </div>
</div>

<!-- Bulk Edit Modal -->
<div class="modal" id="bulkEditModal">
  <div class="modal-content">
    <h3>📦 Bulk Edit Commands</h3>
    <p>Paste JSON: <code>{"A1":"linuxapps://launch?app=vlc", "B2":"linuxapps://launch?app=firefox"}</code></p>
    <textarea id="bulkJson" placeholder='{"A1":"linuxapps://launch?app=newapp"}'></textarea>
    <div class="modal-buttons">
      <button id="cancelBulkModal">Cancel</button>
      <button id="confirmBulkModal" style="background:#2c7a6e;">Apply & Save</button>
    </div>
  </div>
</div>

<script>
  // ==================== DATA ====================
  const TAB_LETTERS = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J'];
  const TAB_NAMES = ["📁 MEDIA", "🌐 BROWSERS", "🛠️ DEV TOOLS", "🎮 GAMES", "📡 NETWORK", "🔧 SYSTEM", "🎨 GRAPHICS", "📦 OFFICE", "🎵 AUDIO", "🧩 UTILITIES"];
  const BUTTON_LABELS = {
    A: ["Launch VLC", "Firefox", "Terminal", "File Manager", "System Monitor", "Text Editor", "Calculator", "Screenshot", "Disk Usage", "Package Updater"],
    B: ["Chrome", "Brave", "Edge", "Tor", "Opera", "Vivaldi", "Chromium", "Firefox Dev", "LibreWolf", "Epiphany"],
    C: ["VS Code", "Git GUI", "Docker", "Postman", "Node.js", "Python IDE", "MySQL Workbench", "Jenkins", "Kubernetes", "DevTools"],
    D: ["Steam", "Lutris", "Minecraft", "SuperTuxKart", "0 A.D.", "Wesnoth", "OpenRA", "Battle for Wesnoth", "Prism Launcher", "RetroArch"],
    E: ["Network Manager", "Wireshark", "Zenmap", "Ping Tool", "Netdata", "OpenVPN", "SSH Manager", "Remote Desktop", "FTP Client", "Bandwidth"],
    F: ["System Logs", "Task Manager", "Kernel Monitor", "Backup Tool", "Disk Partitioner", "Service Manager", "User Accounts", "Date/Time", "Firewall", "GRUB Editor"],
    G: ["GIMP", "Inkscape", "Krita", "Blender", "Darktable", "Shotwell", "Pinta", "RawTherapee", "MyPaint", "ImageMagick"],
    H: ["LibreOffice Writer", "LibreOffice Calc", "Impress", "OnlyOffice", "PDF Viewer", "Calendar", "Evolution Mail", "Thunderbird", "Zim Wiki", "Scanner"],
    I: ["Audacity", "Spotify", "Rhythmbox", "Clementine", "Sound Recorder", "PulseAudio", "Jack Control", "LMMS", "Hydrogen", "Mixxx"],
    J: ["VirtualBox", "WineGUI", "Synaptic", "Timeshift", "Stacer", "BleachBit", "Gnome Tweaks", "Flatpak", "AppImageLauncher", "Conky"]
  };
  const TAB_COLORS = ["#e74c3c", "#2c7a6e", "#8e44ad", "#e67e22", "#2c5282", "#c0392b", "#27ae60", "#d35400", "#2980b9", "#8e44ad"];
  const DEFAULT_LINK = "linuxapps://launch?app=webtop";

  let activeTab = 0;
  let dragSource = null;
  let notificationTimeout = null;
  let saveIndicatorTimeout = null;

  // Storage Key
  const STORAGE_KEY = 'webtop_commands';

  // Helper Functions
  function showNotification(message, type = "info") {
    const notif = document.getElementById('notification');
    notif.innerHTML = `✅ ${message}`;
    notif.classList.add('show');
    if (notificationTimeout) clearTimeout(notificationTimeout);
    notificationTimeout = setTimeout(() => notif.classList.remove('show'), 3500);
  }

  function showSaveIndicator() {
    const indicator = document.getElementById('saveIndicator');
    indicator.classList.add('show');
    if (saveIndicatorTimeout) clearTimeout(saveIndicatorTimeout);
    saveIndicatorTimeout = setTimeout(() => indicator.classList.remove('show'), 1500);
  }

  // Save all commands to localStorage
  function saveCommandsToStorage() {
    const commands = {};
    document.querySelectorAll('.action-btn').forEach(btn => {
      const btnId = btn.getAttribute('data-id');
      if (btnId) {
        commands[btnId] = btn.dataset.link;
      }
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(commands));
    showSaveIndicator();
    return commands;
  }

  // Load commands from localStorage
  function loadCommandsFromStorage() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        const commands = JSON.parse(saved);
        let loadedCount = 0;
        for (const [btnId, link] of Object.entries(commands)) {
          const btn = document.querySelector(`.action-btn[data-id="${btnId}"]`);
          if (btn && link) {
            btn.dataset.link = link;
            const previewSpan = btn.querySelector('.btn-link-preview');
            if (previewSpan) {
              let shortLink = link.length > 45 ? link.substring(0, 42) + '...' : link;
              previewSpan.textContent = shortLink;
            }
            loadedCount++;
          }
        }
        if (loadedCount > 0) {
          showNotification(`Loaded ${loadedCount} saved commands from browser storage`);
        }
        return commands;
      } catch(e) {
        console.error('Failed to load saved commands', e);
      }
    }
    return null;
  }

  // Export all commands as JSON file
  function exportToJSON() {
    const commands = saveCommandsToStorage();
    const dataStr = JSON.stringify(commands, null, 2);
    const blob = new Blob([dataStr], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `webtop-commands-${new Date().toISOString().slice(0,19)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showNotification(`Exported ${Object.keys(commands).length} commands to JSON file`);
  }

  // Import from JSON file
  function importFromJSON(jsonData) {
    try {
      const commands = typeof jsonData === 'string' ? JSON.parse(jsonData) : jsonData;
      let count = 0;
      for (const [btnId, newLink] of Object.entries(commands)) {
        const btn = document.querySelector(`.action-btn[data-id="${btnId}"]`);
        if (btn && newLink) {
          btn.dataset.link = newLink;
          const previewSpan = btn.querySelector('.btn-link-preview');
          if (previewSpan) {
            let shortLink = newLink.length > 45 ? newLink.substring(0, 42) + '...' : newLink;
            previewSpan.textContent = shortLink;
          }
          count++;
        }
      }
      saveCommandsToStorage();
      showNotification(`Imported ${count} commands from file and saved`);
      return count;
    } catch(e) {
      alert('Invalid JSON format. Please check your file.');
      return 0;
    }
  }

  // Bulk edit commands (apply and save)
  function bulkEditCommands(commandsMap) {
    let count = 0;
    for (const [btnId, newLink] of Object.entries(commandsMap)) {
      const btn = document.querySelector(`.action-btn[data-id="${btnId}"]`);
      if (btn && newLink) {
        btn.dataset.link = newLink;
        const previewSpan = btn.querySelector('.btn-link-preview');
        if (previewSpan) {
          let shortLink = newLink.length > 45 ? newLink.substring(0, 42) + '...' : newLink;
          previewSpan.textContent = shortLink;
        }
        count++;
      }
    }
    if (count > 0) {
      saveCommandsToStorage();
      showNotification(`Bulk updated ${count} commands and saved`);
    }
    return count;
  }

  function executeCommand(link, btnId, label) {
    const a = document.createElement('a');
    a.href = link;
    a.target = '_Parent';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => a.remove(), 100);
    showNotification(`${btnId} (${label}) → ${link.substring(0, 60)}`);
  }

  // Edit hyperlink with auto-save
  function editHyperlink(btnElement, currentLink, btnId, label) {
    const newLink = prompt(`Edit command for ${btnId} (${label}):\nCurrent: ${currentLink}`, currentLink);
    if (newLink && newLink.trim()) {
      btnElement.dataset.link = newLink.trim();
      const previewSpan = btnElement.querySelector('.btn-link-preview');
      if (previewSpan) {
        let shortLink = newLink.length > 45 ? newLink.substring(0, 42) + '...' : newLink;
        previewSpan.textContent = shortLink;
      }
      saveCommandsToStorage();
      showNotification(`${btnId} hyperlink updated and saved`);
      return true;
    }
    return false;
  }

  // Create draggable button
  function createButton(letter, idx, label, color, btnId) {
    const btn = document.createElement('div');
    btn.className = 'action-btn';
    btn.setAttribute('draggable', 'true');
    btn.setAttribute('data-id', btnId);
    btn.dataset.link = DEFAULT_LINK;
    btn.style.background = color;
    
    btn.innerHTML = `
      <div class="drag-handle">⋮⋮</div>
      <div class="edit-icon" title="Edit hyperlink">✏️</div>
      <div class="btn-title">${escapeHtml(label)}</div>
      <div class="btn-id">${btnId}</div>
      <div class="btn-link-preview">${DEFAULT_LINK.substring(0, 42)}${DEFAULT_LINK.length > 42 ? '...' : ''}</div>
    `;

    // Click handler (execute)
    btn.addEventListener('click', (e) => {
      if (e.target.classList.contains('edit-icon') || e.target.classList.contains('drag-handle')) return;
      executeCommand(btn.dataset.link, btnId, label);
    });

    // Edit handler with auto-save
    const editIcon = btn.querySelector('.edit-icon');
    editIcon.addEventListener('click', (e) => {
      e.stopPropagation();
      editHyperlink(btn, btn.dataset.link, btnId, label);
    });

    // Drag & Drop
    btn.addEventListener('dragstart', handleDragStart);
    btn.addEventListener('dragend', handleDragEnd);
    btn.addEventListener('dragover', handleDragOver);
    btn.addEventListener('dragenter', handleDragEnter);
    btn.addEventListener('dragleave', handleDragLeave);
    btn.addEventListener('drop', handleDrop);
    
    return btn;
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Drag handlers
  function handleDragStart(e) {
    dragSource = this;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', '');
    this.classList.add('dragging');
  }
  function handleDragEnd(e) {
    this.classList.remove('dragging');
    document.querySelectorAll('.action-btn').forEach(btn => btn.classList.remove('drag-over'));
    dragSource = null;
    saveCommandsToStorage(); // Save new order
  }
  function handleDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
  }
  function handleDragEnter(e) {
    e.preventDefault();
    if (this !== dragSource && this.parentNode === dragSource?.parentNode) {
      this.classList.add('drag-over');
    }
  }
  function handleDragLeave(e) {
    this.classList.remove('drag-over');
  }
  function handleDrop(e) {
    e.preventDefault();
    this.classList.remove('drag-over');
    if (dragSource && this !== dragSource && dragSource.parentNode === this.parentNode) {
      const parent = this.parentNode;
      const children = Array.from(parent.children);
      const srcIdx = children.indexOf(dragSource);
      const dstIdx = children.indexOf(this);
      if (srcIdx < dstIdx) {
        parent.insertBefore(dragSource, this.nextSibling);
      } else {
        parent.insertBefore(dragSource, this);
      }
    }
  }

  // Build UI
  function buildUI() {
    const tabsContainer = document.getElementById('tabsContainer');
    const panelsContainer = document.getElementById('panelsContainer');
    tabsContainer.innerHTML = '';
    panelsContainer.innerHTML = '';

    // Create tabs
    TAB_LETTERS.forEach((letter, idx) => {
      const tabBtn = document.createElement('button');
      tabBtn.className = 'tab';
      if (idx === activeTab) tabBtn.classList.add('active');
      tabBtn.textContent = TAB_NAMES[idx];
      tabBtn.onclick = () => switchTab(idx);
      tabsContainer.appendChild(tabBtn);
    });

    // Create panels with grids
    TAB_LETTERS.forEach((letter, tabIdx) => {
      const panel = document.createElement('div');
      panel.className = 'panel';
      if (tabIdx === activeTab) panel.classList.add('active');
      
      const grid = document.createElement('div');
      grid.className = 'buttons-grid';
      grid.setAttribute('data-tab', letter);
      
      const labels = BUTTON_LABELS[letter];
      const color = TAB_COLORS[tabIdx % TAB_COLORS.length];
      
      for (let i = 0; i < 10; i++) {
        const label = labels[i];
        const btnId = `${letter}${i+1}`;
        const btn = createButton(letter, i, label, color, btnId);
        grid.appendChild(btn);
      }
      
      panel.appendChild(grid);
      panelsContainer.appendChild(panel);
    });
    
    // Load saved commands after UI is built
    loadCommandsFromStorage();
  }

  function switchTab(index) {
    activeTab = index;
    const allTabs = document.querySelectorAll('.tab');
    const allPanels = document.querySelectorAll('.panel');
    allTabs.forEach((tab, i) => {
      if (i === index) tab.classList.add('active');
      else tab.classList.remove('active');
    });
    allPanels.forEach((panel, i) => {
      if (i === index) panel.classList.add('active');
      else panel.classList.remove('active');
    });
  }

  // Search
  function setupSearch() {
    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearSearchBtn');
    
    function filter() {
      const term = searchInput.value.toLowerCase().trim();
      const allBtns = document.querySelectorAll('.action-btn');
      let found = 0;
      allBtns.forEach(btn => {
        const title = btn.querySelector('.btn-title')?.innerText.toLowerCase() || '';
        const btnId = btn.getAttribute('data-id')?.toLowerCase() || '';
        const link = btn.dataset.link?.toLowerCase() || '';
        const match = term === '' || title.includes(term) || btnId.includes(term) || link.includes(term);
        if (match) {
          btn.style.display = 'flex';
          found++;
          if (term) {
            const panel = btn.closest('.panel');
            if (panel && !panel.classList.contains('active')) {
              const idx = Array.from(document.querySelectorAll('.panel')).indexOf(panel);
              if (idx >= 0) switchTab(idx);
            }
          }
        } else {
          btn.style.display = 'none';
        }
      });
    }
    searchInput.addEventListener('input', filter);
    clearBtn.addEventListener('click', () => {
      searchInput.value = '';
      filter();
    });
  }

  // Modal Setup
  function setupModals() {
    // Import JSON modal
    const importModal = document.getElementById('importModal');
    const importBtn = document.getElementById('importBtn');
    const cancelImport = document.getElementById('cancelImportModal');
    const confirmImport = document.getElementById('confirmImportModal');
    const fileInput = document.getElementById('jsonFileInput');
    
    importBtn.onclick = () => { importModal.style.display = 'flex'; };
    cancelImport.onclick = () => { importModal.style.display = 'none'; fileInput.value = ''; };
    confirmImport.onclick = () => {
      const file = fileInput.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          importFromJSON(e.target.result);
          importModal.style.display = 'none';
          fileInput.value = '';
        };
        reader.readAsText(file);
      } else {
        alert('Please select a JSON file');
      }
    };
    
    // Bulk edit modal
    const bulkModal = document.getElementById('bulkEditModal');
    const bulkBtn = document.getElementById('bulkImportBtn');
    const cancelBulk = document.getElementById('cancelBulkModal');
    const confirmBulk = document.getElementById('confirmBulkModal');
    const bulkTextarea = document.getElementById('bulkJson');
    
    bulkBtn.onclick = () => { bulkModal.style.display = 'flex'; };
    cancelBulk.onclick = () => { bulkModal.style.display = 'none'; bulkTextarea.value = ''; };
    confirmBulk.onclick = () => {
      try {
        const data = JSON.parse(bulkTextarea.value);
        bulkEditCommands(data);
        bulkModal.style.display = 'none';
        bulkTextarea.value = '';
      } catch(e) {
        alert('Invalid JSON format. Example: {"A1":"linuxapps://launch?app=test"}');
      }
    };
    
    // Export button
    document.getElementById('exportBtn').onclick = () => exportToJSON();
    
    // Close modals on outside click
    window.onclick = (e) => {
      if (e.target === importModal) importModal.style.display = 'none';
      if (e.target === bulkModal) bulkModal.style.display = 'none';
    };
  }

  // Dark Mode
  function setupDarkMode() {
    const btn = document.getElementById('darkModeBtn');
    const isDark = localStorage.getItem('darkMode') === 'true';
    if (isDark) document.body.classList.add('dark-mode');
    btn.textContent = isDark ? '☀️ Light' : '🌙 Dark';
    btn.onclick = () => {
      document.body.classList.toggle('dark-mode');
      const dark = document.body.classList.contains('dark-mode');
      localStorage.setItem('darkMode', dark);
      btn.textContent = dark ? '☀️ Light' : '🌙 Dark';
    };
  }

  // API for external updates
  window.updateCommand = function(btnId, newLink) {
    const btn = document.querySelector(`.action-btn[data-id="${btnId}"]`);
    if (btn) {
      btn.dataset.link = newLink;
      const preview = btn.querySelector('.btn-link-preview');
      if (preview) preview.textContent = newLink.length > 45 ? newLink.substring(0, 42) + '...' : newLink;
      saveCommandsToStorage();
      showNotification(`${btnId} updated and saved`);
      return true;
    }
    return false;
  };

  window.bulkEditCommands = bulkEditCommands;
  window.exportToJSON = exportToJSON;

  // Init
  function init() {
    buildUI();
    setupSearch();
    setupModals();
    setupDarkMode();
    console.log('✅ Webtop Commander Ready - Auto-save enabled | Export/Import JSON available');
    console.log('💾 All hyperlink edits are automatically saved to browser storage');
    console.log('📁 Use Export JSON to backup your commands, Import JSON to restore them');
  }
  init();
</script>
</body>
</html>
